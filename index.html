function WayfindingPrototype() {
  const [floor, setFloor] = useState(0);
  const [currentBuildingId, setCurrentBuildingId] = useState("sciesa");
  const building = BUILDINGS.find((b) => b.id === currentBuildingId) || BUILDINGS[0];
  const [selectedId, setSelectedId] = useState(null);
  const [selectedStairId, setSelectedStairId] = useState(null);
  const [selectedStairDirection, setSelectedStairDirection] = useState(null);
  // Direzione REALMENTE percorsa (salito/sceso), per il testo del banner — diversa
  // da selectedStairDirection, che ora indica la freccia "di ritorno" da evidenziare.
  const [lastStairTravelDirection, setLastStairTravelDirection] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);
  const [lang, setLang] = useState("it"); // "it" | "en"
  const [a11yMode, setA11yMode] = useState(false);
  const [showA11yPrompt, setShowA11yPrompt] = useState(false);
  const [showCampusMenu, setShowCampusMenu] = useState(false);

  // Palette Okabe-Ito (pensata per essere distinguibile in tutte le forme comuni di
  // daltonismo) usata quando la modalità accessibile è attiva, al posto dei colori normali.
  const AC = a11yMode
    ? {
        amber: "#E69F00", // arancione (pin normali, accenti UI)
        amberSoft: "rgba(230,159,0,0.35)",
        highlight: "#CC79A7", // porpora (Excel "Evidenziato")
        highlightSoft: "rgba(204,121,167,0.35)",
        goto: "#D55E00", // vermiglio (destinazione / "sei qui")
        gotoSoft: "rgba(213,94,0,0.35)",
        stair: "#0072B2", // blu (scale, al posto del verde — mai vicino al rosso/vermiglio)
        stairSoft: "rgba(0,114,178,0.35)",
        muted: "#C7D2DB", // testo secondario più chiaro, contrasto più alto sullo sfondo scuro
        border: 3,
        fontBoost: 2, // px in più sui font dei pin, per leggibilità
      }
    : {
        amber: PALETTE.amber,
        amberSoft: PALETTE.amberSoft,
        highlight: PALETTE.highlight,
        highlightSoft: PALETTE.highlightSoft,
        goto: PALETTE.goto,
        gotoSoft: PALETTE.gotoSoft,
        stair: "#3DDC97",
        stairSoft: "#164B36",
        muted: PALETTE.muted,
        border: 2,
        fontBoost: 0,
      };

  // --- Parametro "show-only" nell'URL dell'iframe: es. ?show-only=PT-S1,PT-S3,REC-SCIESA
  // Filtra quali AULE mostrare sulla mappa. Le scale non sono mai filtrate.
  // Se il parametro non è presente, si mostrano tutte le aule (comportamento di default).
  const [showOnlyCodes] = useState(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("show-only");
      if (!raw) return null;
      return raw
        .split(",")
        .map((s) => s.trim().toUpperCase())
        .filter(Boolean);
    } catch (e) {
      return null;
    }
  });

  // --- Parametro "data-url" nell'URL dell'iframe: es. ?data-url=https://tuosito.it/dati-aule.xlsx
  // Carica un file Excel e sovrascrive nome/attività/orario/descrizione delle aule,
  // associando ogni riga a un pin tramite la colonna "Codice" (deve combaciare col codice del pin, es. PT-S3).
  // Posizione, piano e codice dei pin restano SEMPRE quelli definiti nel codice: l'Excel
  // controlla solo il contenuto testuale, non la geometria della mappa.
  const [externalData, setExternalData] = useState(null);
  const [dataStatus, setDataStatus] = useState("idle"); // idle | loading | loaded | error
  // Foglio facoltativo "Impostazioni" nello stesso Excel: titolo, testo introduttivo,
  // colori, dimensioni ed eventuale esclusione — una riga per sede (colonna "Sede"),
  // più una riga facoltativa senza "Sede" che fa da default per tutte.
  const [pageSettingsRows, setPageSettingsRows] = useState([]);

  useEffect(() => {
    let cancelled = false;
    const params = new URLSearchParams(window.location.search);
    const dataUrl = params.get("data-url");
    if (!dataUrl) return;
    if (typeof window.XLSX === "undefined") {
      setDataStatus("error");
      return;
    }
    setDataStatus("loading");
    fetch(dataUrl)
      .then((res) => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.arrayBuffer();
      })
      .then((buf) => {
        const wb = window.XLSX.read(buf, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet);
        const map = {};
        rows.forEach((row) => {
          const code = String(row.Codice || row.codice || row.Code || row.code || "")
            .trim()
            .toUpperCase();
          if (code) map[code] = row;
        });

        // Foglio "Impostazioni" (facoltativo): una riga per sede, riconosciuta
        // dalla colonna "Sede" (es. "sciesa", "leoni", "bezzecca").
        const settingsSheetName = wb.SheetNames.find(
          (n) => n.trim().toLowerCase() === "impostazioni"
        );
        let settingsRows = [];
        if (settingsSheetName) {
          settingsRows = window.XLSX.utils.sheet_to_json(wb.Sheets[settingsSheetName]);
        }

        if (!cancelled) {
          setExternalData(map);
          setPageSettingsRows(settingsRows);
          setDataStatus("loaded");
        }
      })
      .catch(() => {
        if (!cancelled) setDataStatus("error");
      });
    return () => {
      cancelled = true;
    };
  }, []);

  // --- Parametro "building" nell'URL dell'iframe: es. ?building=leoni
  // Apre direttamente la mappa su una sede specifica (id: "sciesa" | "leoni" | "bezzecca"),
  // senza bisogno di passare anche da una stanza. Se è presente anche "goto" o
  // "userPosition" su una stanza di UN'ALTRA sede, quelli hanno la priorità finale
  // (sono più specifici: sanno anche in quale stanza esatta aprire la mappa).
  useEffect(() => {

  // --- Parametro "goto" nell'URL dell'iframe: es. ?goto=PT-S3
  // Seleziona automaticamente quella stanza all'apertura della pagina

  const [gotoCode, setGotoCode] = useState(null);

  // Indica DOVE SI TROVA FISICAMENTE l'utente (QR fisico appeso in quella posizione).

  const [userPositionCode, setUserPositionCode] = useState(null);

      // Se non c'è anche un "goto", orienta la mappa sulla sede e il piano di dove si trova l'utente.
      // Se c'è anche "goto", quello ha priorità nel decidere sede, piano e pannello iniziali.
      if (!params.get("goto")) {

        if (loc) {
          if (loc.buildingId !== currentBuildingId) setCurrentBuildingId(loc.buildingId);

    }

  }, []);

      const params = new URLSearchParams(window.location.search);
      const goto = params.get("goto");
      if (!goto) return;
      const code = goto.trim().toUpperCase();

      const loc = ALL_LOCATIONS.find((l) => l.code.toUpperCase() === code);
      if (!loc) return;

    if (v === undefined || v === null) return false;

  const UI = {

  const t = UI[lang];
  const fl = (floorObj) => (lang === "en" ? floorObj.labelEn : floorObj.label);
  // Il codice "PT-S3" è una chiave interna; il nome ufficiale della stanza è solo "S3".

  // Riga di impostazioni applicabile alla sede corrente: prima quella con "Sede"

  const pageSettings =
    pageSettingsRows.find((r) => String(r.Sede || "").trim().toLowerCase() === currentBuildingId) ||

  // Titolo e testo introduttivo: se il foglio "Impostazioni" li definisce per questa

  // di default, che segue automaticamente il nome della sede corrente.
  const pageTitle =

  const pageIntro =

  // E la colonna "Nascosta" compilata esclude quella sede dal menu e dalla ricerca globale.
  const hiddenBuildingIds = new Set(

  const visibleBuildings = BUILDINGS.filter((b) => !hiddenBuildingIds.has(b.id));
  const visibleAllLocations = ALL_LOCATIONS.filter((l) => !hiddenBuildingIds.has(l.buildingId));

  useEffect(() => {

  }, [pageSettingsRows, currentBuildingId]);


  const mergeExternal = (loc) => {
    const ext = externalData && externalData[loc.code.toUpperCase()];
    const useEn = lang === "en";

    const name = useEn
      ? (ext && (ext.Nome_EN || ext.nome_en)) || loc.nameEn || (ext && (ext.Nome || ext.nome)) || loc.name

    const activity = useEn
      ? (ext && (ext["Attività_EN"] || ext["Attivita_EN"] || ext.attivita_en)) ||
        loc.activityEn ||
        (ext && (ext.Attività || ext.Attivita)) ||
        loc.activity

    const desc = useEn
      ? (ext && (ext.Descrizione_EN || ext.descrizione_en)) || loc.descEn || (ext && ext.Descrizione) || loc.desc
      : (ext && (ext.Descrizione || ext.descrizione)) || loc.desc;

      ? useEn
        ? ext.Nome_prossima_tappa_EN || ext.nome_prossima_tappa_en || ext.Nome_prossima_tappa || ext.nome_prossima_tappa
        : ext.Nome_prossima_tappa || ext.nome_prossima_tappa
      : null;
    const nextStopCode = ext ? ext.ID_prossima_tappa || ext.id_prossima_tappa || ext.Codice_prossima_tappa || null : null;

        : ext.Commento || ext.commento

    // l'aula viene nascosta dalla mappa. Vuota o assente = visibile, di default.
    const nascostaValue = ext && (ext.Nascosta ?? ext.nascosta ?? ext.Nascosto ?? ext.nascosto);
    const hiddenByExcel = nascostaValue !== undefined && nascostaValue !== null && String(nascostaValue).trim() !== "";

    return {
      ...loc,
      name,
      activity,
      time,

      hiddenByExcel,
      nextStopName: nextStopName || null,
      nextStopCode: nextStopCode ? String(nextStopCode).trim().toUpperCase() : null,
      nextStopComment: nextStopComment || null,

  };

  const VISIBLE_LOCATIONS = (showOnlyCodes
    ? building.locations.filter((l) => showOnlyCodes.includes(l.code.toUpperCase()))
    : building.locations
  )
    .map(mergeExternal)
    .filter((l) => !l.hiddenByExcel);


  const searchResults =
    searchQuery.trim().length > 0
      ? visibleAllLocations.filter(
          (l) =>
            l.name.toLowerCase().includes(searchQuery.trim().toLowerCase()) ||
            l.code.toLowerCase().includes(searchQuery.trim().toLowerCase())
        ).slice(0, 6)
      : [];

  // --- Zoom & pan della mappa: l'immagine si ingrandisce, i pin restano sempre
  // della stessa dimensione a schermo e si spostano solo per seguire il punto giusto.
  const canvasRef = useRef(null);
  const [canvasSize, setCanvasSize] = useState({ w: 0, h: 0 });
  const [view, setView] = useState({ scale: 1, x: 0, y: 0 });
  const [mapActive, setMapActive] = useState(false);
  const [overlayShown, setOverlayShown] = useState(false);
  // Su dispositivi touch il pizzico non entra mai in conflitto con lo scroll a un dito
  // (sono gesti diversi), quindi saltiamo del tutto il "tocca per attivare": la mappa è
  // subito pronta al pizzico. Su desktop, dove la rotellina è lo stesso gesto dello
  // scroll, serve invece un click esplicito prima di abilitare zoom/trascinamento.
  const [isTouchDevice, setIsTouchDevice] = useState(false);
  useEffect(() => {

      const coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
      setIsTouchDevice(Boolean(coarse));

  const gestureRef = useRef({ lastDist: null, lastMid: null, lastTouch: null });

  useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    const update = () => setCanvasSize({ w: el.clientWidth, h: el.clientHeight });
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [floor]);

  const clampView = (next) => {
    const scaledW = canvasSize.w * next.scale;
    const scaledH = canvasSize.h * next.scale;
    const minX = Math.min(0, canvasSize.w - scaledW);
    const minY = Math.min(0, canvasSize.h - scaledH);
    return {
      scale: next.scale,
      x: Math.max(minX, Math.min(0, next.x)),
      y: Math.max(minY, Math.min(0, next.y)),
    };
  };

  const zoomAt = (midX, midY, scaleDelta) => {
    setView((prev) => {
      const newScale = Math.max(1, Math.min(4, prev.scale * scaleDelta));
      const ratio = newScale / prev.scale;
      const newX = midX - (midX - prev.x) * ratio;
      const newY = midY - (midY - prev.y) * ratio;
      return clampView({ scale: newScale, x: newX, y: newY });

    setView({ scale: 1, x: 0, y: 0 });

  const dist = (t1, t2) => Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
  const mid = (t1, t2, rect) => ({
    x: (t1.clientX + t2.clientX) / 2 - rect.left,
    y: (t1.clientY + t2.clientY) / 2 - rect.top,
  });

  const onTouchStart = (e) => {
    if (!mapActive) return;
    const rect = canvasRef.current.getBoundingClientRect();
    if (e.touches.length === 2) {
      gestureRef.current.lastDist = dist(e.touches[0], e.touches[1]);
      gestureRef.current.lastMid = mid(e.touches[0], e.touches[1], rect);
    } else if (e.touches.length === 1) {
      gestureRef.current.lastTouch = {
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top,
      };
    }
  };

  const onTouchMove = (e) => {
    if (!mapActive) return;
    const rect = canvasRef.current.getBoundingClientRect();
    if (e.touches.length === 2) {
      e.preventDefault();
      const newDist = dist(e.touches[0], e.touches[1]);
      const newMid = mid(e.touches[0], e.touches[1], rect);
      const g = gestureRef.current;
      if (g.lastDist) {
        const scaleDelta = newDist / g.lastDist;
        zoomAt(newMid.x, newMid.y, scaleDelta);
      }
      g.lastDist = newDist;
      g.lastMid = newMid;
    } else if (e.touches.length === 1 && view.scale > 1) {
      e.preventDefault();
      const cur = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
      const g = gestureRef.current;
      if (g.lastTouch) {
        const dx = cur.x - g.lastTouch.x;
        const dy = cur.y - g.lastTouch.y;
        setView((prev) => clampView({ scale: prev.scale, x: prev.x + dx, y: prev.y + dy }));
      }

    }
  };

  const onTouchEnd = (e) => {
    if (e.touches.length < 2) gestureRef.current.lastDist = null;
    if (e.touches.length < 1) gestureRef.current.lastTouch = null;
  };

  const onWheel = (e) => {
    if (!mapActive) return;
    e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const scaleDelta = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(x, y, scaleDelta);
  };

  // --- Trascinamento con il mouse (desktop): click e tieni premuto per spostarti
  // nella mappa zoomata, come su Google Maps. Funziona solo quando sei zoomato,
  // per non interferire con un normale click sui pin quando la mappa è a riposo.
  const mouseDragRef = useRef(null);

  const onMouseDown = (e) => {
    if (isTouchDevice || !mapActive || view.scale <= 1.01) return;
    mouseDragRef.current = { x: e.clientX, y: e.clientY };

    const onMouseMove = (moveEvent) => {
      if (!mouseDragRef.current) return;
      const dx = moveEvent.clientX - mouseDragRef.current.x;
      const dy = moveEvent.clientY - mouseDragRef.current.y;
      mouseDragRef.current = { x: moveEvent.clientX, y: moveEvent.clientY };
      setView((prev) => clampView({ scale: prev.scale, x: prev.x + dx, y: prev.y + dy }));
    };
    const onMouseUp = () => {
      mouseDragRef.current = null;
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    };
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);
  };

  // Converte la posizione in percentuale (x%,y%) di un pin nella posizione
  // reale in pixel dentro il riquadro, tenendo conto dello zoom/pan corrente.
  const projectPoint = (xPct, yPct) => {
    const baseX = (xPct / 100) * canvasSize.w;
    const baseY = (yPct / 100) * canvasSize.h;
    return { x: view.x + baseX * view.scale, y: view.y + baseY * view.scale };
  };

  // --- Piccolo "tock" sonoro generato al volo (nessun file audio esterno da caricare),
  // per dare un feedback discreto quando si tocca un pin o una scala.
  const audioCtxRef = useRef(null);
  const playTapSound = () => {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      if (!audioCtxRef.current) audioCtxRef.current = new AudioCtx();
      const ctx = audioCtxRef.current;
      if (ctx.state === "suspended") ctx.resume();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 720;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.09);
    } catch (e) {
      // audio non disponibile in questo browser: nessun problema, si prosegue senza suono
    }
  };

  const selectLocation = (id) => {
    const loc = VISIBLE_LOCATIONS.find((l) => l.id === id);
    if (!loc) return;
    playTapSound();
    setFloor(loc.floor);
    setSelectedId(id);
    setSelectedStairId(null);
    setSelectedStairDirection(null);
    setLastStairTravelDirection(null);

  const goToStair = (stair, targetFloor, direction) => {
    playTapSound();
    setFloor(targetFloor);
    setSelectedStairId(stair.id);
    // Evidenzia la freccia OPPOSTA a quella appena cliccata: sul nuovo piano, indica
    // "da qui torneresti indietro", invece di ripetere la stessa direzione di salita/discesa.
    setSelectedStairDirection(-direction);
    setLastStairTravelDirection(direction);
    setSelectedId(null);

  // Usata dalla ricerca globale: se il risultato appartiene a un'altra sede,

  const selectGlobalLocation = (loc) => {
    playTapSound();
    if (loc.buildingId && loc.buildingId !== currentBuildingId) {

    }

    setSelectedId(loc.id);
    setSelectedStairId(null);
    setSelectedStairDirection(null);
    setLastStairTravelDirection(null);
  };

  const selected = VISIBLE_LOCATIONS.find((l) => l.id === selectedId) || null;
  // "Prossima tappa" ora arriva SOLO dall'Excel (colonne Nome_prossima_tappa / ID_prossima_tappa / Commento).
  // Se non sono compilate per questa stanza, semplicemente non c'è alcuna prossima tappa da mostrare.
  const next =
    selected && selected.nextStopCode
      ? VISIBLE_LOCATIONS.find((l) => l.code.toUpperCase() === selected.nextStopCode) || null
      : null;

  const currentFloor = building.floors.find((f) => f.id === floor);
  const pinsOnFloor = VISIBLE_LOCATIONS.filter((l) => l.floor === floor);

  // Stanze disattivate dall'Excel (colonna "Nascosta"): non selezionabili, non in
  // ricerca, ma restano visibili sulla mappa come solo nome in grigio, senza pin,
  // così chi guarda la mappa capisce che quella stanza esiste ma non è disponibile ora.
  const disabledOnFloor = building.locations
    .map(mergeExternal)
    .filter((l) => l.hiddenByExcel && l.floor === floor);

  return (
    <div
      style={{ background: PALETTE.bg, color: PALETTE.text, fontFamily: "'DM Sans', sans-serif" }}
      className="min-h-screen w-full"
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeSlide 0.25s ease-out; }
        .display-font { font-family: 'DM Sans', sans-serif; }
        .mono-font { font-family: 'IBM Plex Mono', monospace; }

        .phone-col { width: 100%; }

        .legend-icon-mobile { display: inline-flex; }
        .legend-icon-desktop { display: none; }
        @media (min-width: 768px) {
          .legend-icon-mobile { display: none; }
          .legend-icon-desktop { display: inline-flex; }
        }
        ${a11yMode ? ".fade-in, * { transition: none !important; animation: none !important; }" : ""}
      `}</style>

      <div className="max-w-5xl mx-auto px-3 py-5 md:px-4 md:py-12">
        {/* Logo + switch lingua + modalità accessibile: riga statica in alto */}
        <div className="flex justify-between items-center mb-3 md:mb-4 gap-2">
          <img
            src="https://www.ied.it/logos/2025/IED-Logo-Red-new.png"
            alt="IED"
            style={{ height: 28 }}
          />
          <div className="flex items-center gap-2">
            <button
              onClick={() => setShowA11yPrompt(true)}
              className="rounded-full p-2 flex items-center justify-center"
              style={{
                background: a11yMode ? AC.amber : PALETTE.panel,
                border: `1px solid ${a11yMode ? AC.amber : PALETTE.grid}`,
              }}
              title={t.a11yToggle}
            >
              <Icon.Accessibility size={15} color={a11yMode ? "#1a1200" : AC.muted} />
            </button>
            <div
              style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}` }}
              className="rounded-full p-1 flex gap-1"
            >
              <button
                onClick={() => setLang("it")}
                className="mono-font text-[10px] px-2.5 py-1 rounded-full"
                style={{ background: lang === "it" ? AC.amber : "transparent", color: lang === "it" ? "#1a1200" : AC.muted }}
              >
                ITA
              </button>
              <button
                onClick={() => setLang("en")}
                className="mono-font text-[10px] px-2.5 py-1 rounded-full"
                style={{ background: lang === "en" ? AC.amber : "transparent", color: lang === "en" ? "#1a1200" : AC.muted }}
              >
                ENG
              </button>
            </div>
          </div>
        </div>

        {/* Header */}
        <div className="mb-5 md:mb-8">
          <div className="relative inline-block">
            <button
              onClick={() => {
                if (visibleBuildings.length > 1) setShowCampusMenu((v) => !v);
              }}
              className="flex items-center gap-2 mb-2 md:mb-3"
              style={{ color: AC.amber, cursor: visibleBuildings.length > 1 ? "pointer" : "default" }}
            >
              <Icon.Building2 size={16} />
              <span className="mono-font text-[10px] md:text-xs tracking-widest uppercase">{t.kickerFor(building.name)}</span>
              {visibleBuildings.length > 1 && <Icon.ChevronDown size={13} style={{ opacity: 0.7 }} />}
            </button>

            {showCampusMenu && visibleBuildings.length > 1 && (
              <>
                <div className="fixed inset-0" style={{ zIndex: 55 }} onClick={() => setShowCampusMenu(false)} />
                <div
                  className="absolute left-0 top-full mt-1 rounded-xl overflow-hidden fade-in"
                  style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}`, zIndex: 56, minWidth: 280 }}
                >
                  <div className="px-3 py-2 mono-font text-[10px] uppercase tracking-wide" style={{ color: AC.muted, borderBottom: `1px solid ${PALETTE.grid}` }}>
                    {t.chooseCampus}
                  </div>
                  {visibleBuildings.map((b) => {
                    const isCurrent = b.id === currentBuildingId;

                    const content = (
                      <>
                        <span className={isCurrent ? "font-semibold" : ""}>{b.name}</span>
                        {isCurrent && (
                          <span className="mono-font text-[9px]" style={{ color: AC.muted }}>
                            {t.currentCampus}
                          </span>
                        )}
                      </>
                    );
                    const rowStyle = {
                      color: isCurrent ? AC.amber : PALETTE.text,
                      cursor: isCurrent ? "default" : "pointer",
                      borderBottom: `1px solid ${PALETTE.grid}`,
                    };

                    if (isCurrent) {
                      return (
                        <div key={b.id} className="flex items-center justify-between px-3 py-2.5 text-sm" style={rowStyle}>
                          {content}
                        </div>
                      );
                    }
                    return (
                      <button
                        key={b.id}
                        onClick={() => {
                          setCurrentBuildingId(b.id);
                          setFloor(0);
                          setSelectedId(null);
                          setView({ scale: 1, x: 0, y: 0 });
                          setShowCampusMenu(false);
                        }}
                        className="w-full flex items-center justify-between px-3 py-2.5 text-sm"
                        style={rowStyle}
                      >
                        {content}
                      </button>
                    );
                  })}
                </div>
              </>
            )}
          </div>
          <h1
            className="display-font text-2xl md:text-4xl font-semibold mb-2 md:mb-3 leading-tight"
            style={{ color: titleColor, fontSize: titleSize ? `${titleSize}px` : undefined }}
          >
            {pageTitle}
          </h1>
          <p
            style={{ color: introColor || AC.muted, fontSize: introSize ? `${introSize}px` : undefined }}
            className="max-w-2xl leading-relaxed text-sm md:text-base"
          >
            {pageIntro}
          </p>
        </div>

        <div className="flex flex-col lg:flex-row gap-5 md:gap-6 items-start">
          {/* MAP PANEL */}
          <div className="w-full lg:flex-1">
            {/* Stato caricamento dati da Excel esterno, se richiesto via ?data-url= */}
            {dataStatus === "loading" && (
              <p className="text-[11px] mb-2" style={{ color: AC.muted }}>
                {t.dataLoading}
              </p>
            )}
            {dataStatus === "error" && (
              <p className="text-[11px] mb-2" style={{ color: "#E8A34A" }}>
                {t.dataError}
              </p>
            )}

            {/* Ricerca aule con autocompletamento */}
            <div className="relative mb-4">
              <div
                className="flex items-center gap-2 rounded-xl px-3 py-2.5"
                style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}` }}
              >
                <Icon.Search size={16} color={AC.muted} />
                <input
                  value={searchQuery}
                  onChange={(e) => {
                    setSearchQuery(e.target.value);
                    setSearchOpen(true);
                  }}
                  onFocus={() => setSearchOpen(true)}
                  onBlur={() => setTimeout(() => setSearchOpen(false), 120)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && searchResults.length > 0) {
                      selectLocation(searchResults[0].id);
                      setSearchQuery(searchResults[0].name);
                      setSearchOpen(false);
                    } else if (e.key === "Escape") {
                      setSearchOpen(false);
                    }
                  }}
                  placeholder={t.searchPlaceholder}
                  className="flex-1 bg-transparent outline-none text-sm"
                  style={{ color: PALETTE.text }}
                />
                {searchQuery && (
                  <button
                    onClick={() => {
                      setSearchQuery("");
                      setSearchOpen(false);
                    }}
                  >
                    <Icon.X size={15} color={AC.muted} />
                  </button>
                )}
              </div>

              {searchOpen && searchQuery.trim().length > 0 && (
                <div
                  className="absolute left-0 right-0 mt-1.5 rounded-xl overflow-hidden fade-in"
                  style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}`, zIndex: 40 }}
                >
                  {searchResults.length > 0 ? (
                    searchResults.map((loc) => {
                      const locBuilding = BUILDINGS.find((b) => b.id === loc.buildingId) || building;
                      const locFloorObj = locBuilding.floors.find((f) => f.id === loc.floor);
                      const sameBuilding = locBuilding.id === currentBuildingId;
                      const sameFloor = sameBuilding && loc.floor === floor;
                      return (
                        <button
                          key={loc.id}
                          onMouseDown={() => {
                            selectGlobalLocation(loc);
                            setSearchQuery(loc.name);
                            setSearchOpen(false);
                          }}
                          className="w-full text-left px-3 py-2.5 flex items-center justify-between"
                          style={{ borderBottom: `1px solid ${PALETTE.grid}` }}
                        >
                          <div>
                            <div className="text-sm font-medium">{loc.name}</div>
                            <div className="mono-font text-[10px]">
                              <span style={{ color: AC.muted }}>{loc.code} · </span>
                              <span style={{ color: sameBuilding ? AC.amber : AC.muted }}>{locBuilding.name}</span>
                              {locFloorObj && (
                                <>
                                  <span style={{ color: AC.muted }}> · </span>
                                  <span style={{ color: sameFloor ? AC.amber : AC.muted }}>{fl(locFloorObj)}</span>
                                </>
                              )}
                            </div>
                          </div>
                          <Icon.MapPin size={14} color={AC.amber} />
                        </button>
                      );
                    })
                  ) : (
                    <div className="px-3 py-2.5 text-sm" style={{ color: AC.muted }}>
                      {t.noResults}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* floor tabs */}
            <div className="flex gap-2 mb-3">
              {building.floors.map((f) => (
                <button
                  key={f.id}
                  onClick={() => {
                    setFloor(f.id);
                    setSelectedStairId(null);
                    setSelectedStairDirection(null);
    setLastStairTravelDirection(null);
                  }}
                  className="flex-1 rounded-lg py-2.5 px-3 flex flex-col items-center transition-colors"
                  style={{
                    background: floor === f.id ? AC.amber : PALETTE.panel,
                    color: floor === f.id ? "#1a1200" : PALETTE.text,
                    border: `1px solid ${floor === f.id ? AC.amber : PALETTE.grid}`,
                  }}
                >
                  <span className="display-font font-semibold text-sm">{f.code}</span>
                  <span className="text-[11px]" style={{ opacity: 0.85 }}>
                    {fl(f)}
                  </span>
                </button>
              ))}
            </div>

            {/* canvas */}
            <div
              ref={canvasRef}
              className="relative w-full rounded-2xl overflow-hidden select-none"
              style={{
                aspectRatio: "1100 / 1174",
                background: PALETTE.panel,
                border: `1px solid ${PALETTE.grid}`,
                touchAction: mapActive && view.scale > 1 ? "none" : "pan-y",
                cursor: !isTouchDevice && mapActive && view.scale > 1.01 ? "grab" : "default",
              }}
              onTouchStart={onTouchStart}
              onTouchMove={onTouchMove}
              onTouchEnd={onTouchEnd}
              onWheel={onWheel}
              onMouseDown={onMouseDown}
              onClick={() => {
                if (!mapActive && !overlayShown) setOverlayShown(true);
              }}
            >
              {/* livello che si ingrandisce/sposta: solo l'immagine vive qui */}
              <div
                className="absolute inset-0"
                style={{
                  backgroundImage: currentFloor.hasPhoto ? `url(${building.floorImg})` : "none",
                  backgroundSize: "cover",
                  backgroundPosition: "center",
                  transform: `translate(${view.x}px, ${view.y}px) scale(${view.scale})`,
                  transformOrigin: "0 0",
                  willChange: "transform",
                }}
              />

              {!currentFloor.hasPhoto && (
                <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 p-6 text-center">
                  <Icon.ImageOff size={28} style={{ color: AC.muted }} />
                  <p className="text-sm whitespace-pre-line" style={{ color: AC.muted }}>
                    {t.noPhoto(fl(currentFloor))}
                  </p>
                </div>
              )}

              {currentFloor.hasPhoto && (
                <div
                  className="absolute inset-0"
                  style={{
                    background: "linear-gradient(to bottom, rgba(15,27,45,0.05), rgba(15,27,45,0.25))",
                    transform: `translate(${view.x}px, ${view.y}px) scale(${view.scale})`,
                    transformOrigin: "0 0",
                  }}
                />
              )}

              {/* pin e scale vivono FUORI dal livello zoomato: dimensione fissa,
                  posizione ricalcolata ad ogni zoom/pan per restare ancorati al punto giusto */}
              {pinsOnFloor.map((loc) => {
                const p = projectPoint(loc.x, loc.y);
                const isActive = selectedId === loc.id;
                const anySelected = selectedId !== null;
                const isGotoTarget = gotoCode && loc.code.toUpperCase() === gotoCode;
                const isUserPos = userPositionCode && loc.code.toUpperCase() === userPositionCode;
                // L'aspetto "attivo" (nome in grassetto, icona sempre visibile, piena opacità)
                // si applica anche al pin "sei qui", non solo a quello selezionato al momento.
                const looksActive = isActive || isUserPos;
                const size = isActive ? 30 : isUserPos ? 24 : anySelected ? 16 : 20;
                const pinColor = isGotoTarget || isUserPos ? AC.goto : loc.highlighted ? AC.highlight : AC.amber;
                const pinColorSoft = isGotoTarget || isUserPos ? AC.gotoSoft : loc.highlighted ? AC.highlightSoft : AC.amberSoft;
                const activeTextColor = isGotoTarget || isUserPos || loc.highlighted ? "#2a0a0a" : "#1a1200";

                // Vicino ai bordi del riquadro, l'etichetta si "appoggia" verso l'interno
                // invece di restare centrata sul pin, così non finisce mai fuori dall'area visibile.
                const edgeMargin = 95;
                let labelAnchor = "center"; // "center" | "left" | "right"
                if (canvasSize.w) {
                  if (p.x < edgeMargin) labelAnchor = "left";
                  else if (p.x > canvasSize.w - edgeMargin) labelAnchor = "right";
                }
                const labelStyle =
                  labelAnchor === "left"
                    ? { left: 0, transform: "translateX(0)" }
                    : labelAnchor === "right"
                    ? { left: 0, transform: "translateX(-100%)" }
                    : { left: 0, transform: "translateX(-50%)" };

                return (
                  <button
                    key={loc.id}
                    onClick={(e) => {
                      e.stopPropagation();
                      selectLocation(loc.id);
                    }}
                    onMouseDown={(e) => e.stopPropagation()}
                    className="absolute top-0 left-0 p-1.5"
                    style={{
                      transform: `translate(${p.x}px, ${p.y}px)`,
                      willChange: "transform",
                      zIndex: looksActive ? 20 : 10,
                    }}
                  >
                    <div
                      className="rounded-full flex items-center justify-center transition-all hover:scale-110"
                      style={{
                        position: "absolute",
                        left: 0,
                        top: 0,
                        transform: "translate(-50%, -50%)",
                        width: size,
                        height: size,
                        background: looksActive ? pinColor : "#0B1626",
                        border: `${AC.border}px solid ${pinColor}`,
                        boxShadow: looksActive ? `0 0 0 6px ${pinColorSoft}` : "0 1px 6px rgba(0,0,0,0.5)",
                        opacity: !looksActive && anySelected ? 0.7 : 1,
                      }}
                    >
                      {(looksActive || !anySelected) && (
                        <Icon.MapPin size={14 + AC.fontBoost} color={looksActive ? activeTextColor : pinColor} />
                      )}
                    </div>

                    {isUserPos && (
                      <span
                        className="mono-font px-2 py-0.5 rounded-full font-bold whitespace-nowrap flex items-center gap-1"
                        style={{
                          position: "absolute",
                          top: -size / 2 - 22,
                          background: AC.goto,
                          color: "#2a0a0a",
                          fontSize: 9 + AC.fontBoost,
                          ...labelStyle,
                        }}
                      >
                        <span
                          className="rounded-full"
                          style={{ width: 5, height: 5, background: "#2a0a0a", display: "inline-block" }}
                        />
                        {t.youAreHere}
                      </span>
                    )}

                    {(looksActive || view.scale >= 1.3) && (
                      <span
                        className={looksActive ? "px-1.5 py-0.5 rounded transition-opacity font-bold whitespace-nowrap" : "mono-font px-1.5 py-0.5 rounded transition-opacity whitespace-nowrap"}
                        style={{
                          position: "absolute",
                          top: size / 2 + 4,
                          background: "#0B1626",
                          color: pinColor,
                          opacity: !looksActive && anySelected ? 0.55 : 1,
                          fontSize: (looksActive ? 10 : 9) + AC.fontBoost,
                          ...labelStyle,
                        }}
                      >
                        {looksActive ? loc.name : displayCode(loc.code)}
                      </span>
                    )}
                  </button>
                );
              })}

              {/* Stanze disattivate dall'Excel: solo nome in grigio, nessun pin, non cliccabili.
                  A differenza dei pin attivi, l'etichetta resta sempre centrata sul punto reale:
                  non c'è bisogno che "eviti" i bordi, dato che non è un elemento con cui si interagisce. */}
              {disabledOnFloor.map((loc) => {
                const p = projectPoint(loc.x, loc.y);
                return (
                  <div
                    key={loc.id}
                    className="absolute top-0 left-0"
                    style={{ transform: `translate(${p.x}px, ${p.y}px)`, willChange: "transform", zIndex: 8 }}
                  >
                    {view.scale >= 1.3 && (
                      <span
                        className="mono-font px-1.5 py-1 rounded text-center"
                        style={{
                          position: "absolute",
                          top: -8,
                          left: 0,
                          transform: "translateX(-50%)",
                          maxWidth: 110,
                          lineHeight: 1.25,
                          background: "rgba(11,22,38,0.7)",
                          color: AC.muted,
                          opacity: 0.7,
                          fontSize: 9 + AC.fontBoost,
                        }}
                      >
                        {loc.name}
                      </span>
                    )}
                  </div>
                );
              })}
              {building.stairs.map((s) => {
                const directions = floor === 0 ? [1] : floor === 2 ? [-1] : [1, -1];
                const p = projectPoint(s.x, s.y);

                // Quando ci sono due frecce affiancate (su+giù), la coppia è più larga
                // di una sola: vicino ai bordi va "spinta" verso l'interno perché non
                // sconfini fuori dal riquadro della mappa — ma SOLO quando non sei
                // zoomato: una volta ingrandita la mappa, la posizione proiettata è
                // già quella corretta e non va più "corretta" verso il bordo.
                const groupWidth = directions.length === 2 ? 64 : 30;
                let centerX = p.x;
                if (canvasSize.w && view.scale <= 1.01) {
                  const half = groupWidth / 2;
                  if (centerX - half < 2) centerX = half + 2;
                  else if (centerX + half > canvasSize.w - 2) centerX = canvasSize.w - 2 - half;
                }

                return (
                  <div
                    key={s.id}
                    className="absolute top-0 left-0 flex flex-col items-center"
                    style={{ transform: `translate(${centerX}px, ${p.y}px) translate(-50%, -50%)`, willChange: "transform", zIndex: 5 }}
                  >
                    <div className="flex items-center gap-1">
                      {directions.map((direction) => {
                        const targetFloor = floor + direction;
                        const isActive = selectedStairId === s.id && selectedStairDirection === direction;
                        return (
                          <button
                            key={direction}
                            onClick={(e) => {
                              e.stopPropagation();
                              goToStair(s, targetFloor, direction);
                            }}
                            onMouseDown={(e) => e.stopPropagation()}
                            className="rounded-full flex items-center justify-center transition-transform hover:scale-110 p-1"
                            style={{
                              width: 28,
                              height: 28,
                              background: isActive ? AC.stair : "#0B1626",
                              border: `${AC.border}px solid ${AC.stair}`,
                              boxShadow: isActive ? `0 0 0 6px ${AC.stairSoft}` : "0 1px 6px rgba(0,0,0,0.5)",
                            }}
                            title={`${s.label} → ${fl(building.floors[targetFloor])}`}
                          >
                            {direction === 1 ? (
                              <Icon.ArrowUpCircle size={13 + AC.fontBoost} color={isActive ? "#0B1626" : AC.stair} />
                            ) : (
                              <Icon.ArrowDownCircle size={13 + AC.fontBoost} color={isActive ? "#0B1626" : AC.stair} />
                            )}
                          </button>
                        );
                      })}
                    </div>
                    <span
                      className="mono-font mt-1 px-1.5 py-0.5 rounded"
                      style={{ background: "#0B1626", color: AC.stair, fontSize: 9 + AC.fontBoost }}
                    >
                      {s.label.replace("Scala ", "")}
                    </span>
                  </div>
                );
              })}

              {view.scale > 1.03 && (
                <button
                  onClick={resetZoom}
                  className="absolute top-2 right-2 mono-font text-[10px] px-2.5 py-1.5 rounded-full"
                  style={{ background: "rgba(11,22,38,0.85)", color: AC.amber, border: `1px solid ${AC.amber}`, zIndex: 100 }}
                >
                  {t.resetZoom}
                </button>
              )}

              {/* L'overlay compare solo dopo il primo tocco sulla mappa (che viene
                  "assorbito" solo per farlo apparire, senza attivare nulla). Il tocco
                  successivo, sull'overlay stesso, attiva davvero la mappa. */}
              {overlayShown && !mapActive && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setMapActive(true);
                    setOverlayShown(false);
                  }}
                  className="absolute inset-0 flex items-center justify-center fade-in"
                  style={{ background: "rgba(11,22,38,0.45)", zIndex: 30 }}
                >
                  <span
                    className="mono-font text-xs px-4 py-2 rounded-full flex items-center gap-2"
                    style={{ background: "rgba(11,22,38,0.9)", color: PALETTE.text, border: `1px solid ${AC.amber}` }}
                  >
                    <Icon.MapPin size={13} color={AC.amber} />
                    {t.overlayTouch}
                  </span>
                </button>
              )}
            </div>
            {(mapActive ? t.hintActive : overlayShown ? t.hintOverlayShown : t.hintIdle) && (
              <p className="text-[11px] mt-1.5" style={{ color: AC.muted }}>
                {mapActive ? t.hintActive : overlayShown ? t.hintOverlayShown : t.hintIdle}
              </p>
            )}

            {/* Piccola legenda: cosa indicano i due simboli sulla mappa.
                Le icone hanno una dimensione fissa in pixel, quindi ne uso due versioni
                (piccola su mobile, più grande su desktop) invece di una sola scalata via CSS. */}
            <div className="flex items-center gap-5 md:gap-7 mt-2.5 md:mt-4">
              <div className="flex items-center gap-2 md:gap-2.5">
                <span className="legend-icon-mobile">
                  <Icon.MapPin size={14} color={AC.amber} />
                </span>
                <span className="legend-icon-desktop">
                  <Icon.MapPin size={16} color={AC.amber} />
                </span>
                <span className="text-xs md:text-sm" style={{ color: AC.muted }}>
                  {t.legendRooms}
                </span>
              </div>
              <div className="flex items-center gap-2 md:gap-2.5">
                <span className="legend-icon-mobile">
                  <Icon.ArrowUpCircle size={14} color={AC.stair} />
                </span>
                <span className="legend-icon-desktop">
                  <Icon.ArrowUpCircle size={16} color={AC.stair} />
                </span>
                <span className="text-xs md:text-sm" style={{ color: AC.muted }}>
                  {t.legendStairs}
                </span>
              </div>
            </div>
          </div>

          {/* PHONE MOCK */}
          <div className="phone-col flex justify-center">
            <div
              className="rounded-[2.25rem] p-2.5 w-full"
              style={{ background: "#0B1626", border: `1px solid ${PALETTE.grid}`, maxWidth: 300 }}
            >
              <div className="flex justify-center mb-1.5">
                <div className="w-16 h-1.5 rounded-full" style={{ background: PALETTE.grid }} />
              </div>
              <div className="rounded-2xl overflow-y-auto" style={{ background: PALETTE.bg, maxHeight: "62vh" }}>
                <div className="p-4" key={selectedId || "home"}>
                  {!selected ? (
                    <div className="fade-in">
                      <div className="flex items-center gap-2 mb-4" style={{ color: AC.amber }}>
                        <Icon.Building2 size={16} />
                        <span className="mono-font text-[11px] uppercase tracking-wide">
                          {building.name} · {fl(currentFloor)}
                        </span>
                      </div>
                      {selectedStairId ? (
                        <div
                          className="rounded-lg p-2.5 mb-4 flex items-center gap-2"
                          style={{ background: "#122A22", border: "1px solid #245C45" }}
                        >
                          <span style={{ flexShrink: 0, width: 16, height: 16, display: "inline-flex" }}>
                            {lastStairTravelDirection === -1 ? (
                              <Icon.ArrowDownCircle size={16} color={AC.stair} />
                            ) : (
                              <Icon.ArrowUpCircle size={16} color={AC.stair} />
                            )}
                          </span>
                          <span className="text-xs" style={{ color: "#8FE8C8" }}>
                            {t.arrivedVia(building.stairs.find((s) => s.id === selectedStairId)?.label, lastStairTravelDirection, fl(currentFloor))}
                          </span>
                        </div>
                      ) : (
                        <>
                          <h2 className="display-font text-lg font-semibold mb-1">{t.waitingScan}</h2>
                          <p className="text-xs mb-4" style={{ color: AC.muted }}>
                            {t.waitingScanDesc}
                          </p>
                        </>
                      )}
                      <div className="flex flex-col gap-2">
                        {pinsOnFloor.map((loc) => (
                          <button
                            key={loc.id}
                            onClick={() => selectLocation(loc.id)}
                            className="text-left rounded-lg p-2.5 flex items-center justify-between"
                            style={{ background: PALETTE.panelAlt, border: `1px solid ${PALETTE.grid}` }}
                          >
                            <div>
                              <div className="text-sm font-medium">{loc.name}</div>
                              <div className="mono-font text-[10px]" style={{ color: AC.muted }}>
                                {loc.code}{loc.time ? ` · ${loc.time}` : ""}
                              </div>
                            </div>
                            <Icon.ArrowRight size={14} style={{ color: AC.amber }} />
                          </button>
                        ))}
                        {pinsOnFloor.length === 0 && (
                          <p className="text-xs" style={{ color: AC.muted }}>
                            {t.noRoomsFloor}
                          </p>
                        )}
                      </div>
                    </div>
                  ) : (
                    <div className="fade-in">
                      <button
                        onClick={() => setSelectedId(null)}
                        className="flex items-center gap-1 mb-4 text-xs"
                        style={{ color: AC.muted }}
                      >
                        <Icon.Home size={12} /> {t.backToMap}
                      </button>
                      <div className="mono-font text-[11px] uppercase tracking-wide mb-1" style={{ color: AC.amber }}>
                        {building.name} · {fl(currentFloor)}
                      </div>
                      <h2 className="display-font text-xl font-semibold mb-2 leading-tight">{selected.name}</h2>
                      {selected.time && (
                        <div
                          className="inline-block mono-font text-[10px] px-2 py-1 rounded mb-3"
                          style={{ background: PALETTE.panelAlt, color: PALETTE.text }}
                        >
                          {selected.time}
                        </div>
                      )}
                      <p className="text-base font-semibold mb-1">{selected.activity}</p>
                      <p className="text-xs leading-relaxed mb-5" style={{ color: AC.muted }}>
                        {selected.desc}
                      </p>

                      {selected.nextStopName && (
                        <div className="rounded-xl p-3" style={{ background: PALETTE.panelAlt, border: `1px solid ${PALETTE.grid}` }}>
                          <div className="text-[10px] mb-1" style={{ color: AC.muted }}>
                            {t.nextStop}
                          </div>
                          {next ? (
                            <button onClick={() => selectLocation(next.id)} className="w-full flex items-center justify-between">
                              <div className="text-left">
                                <div className="text-sm font-medium">{selected.nextStopName}</div>
                                <div className="mono-font text-[10px]" style={{ color: AC.muted }}>
                                  {fl(building.floors[next.floor])}
                                </div>
                              </div>
                              <Icon.ArrowRight size={16} style={{ color: AC.amber }} />
                            </button>
                          ) : (
                            <div className="text-sm font-medium">{selected.nextStopName}</div>
                          )}
                          {selected.nextStopComment && (
                            <p className="text-xs mt-1.5" style={{ color: AC.muted }}>
                              {selected.nextStopComment}
                            </p>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {showA11yPrompt && (
        <div
          className="fixed inset-0 flex items-center justify-center fade-in"
          style={{ background: "rgba(0,0,0,0.5)", zIndex: 70 }}
          onClick={() => setShowA11yPrompt(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className="rounded-2xl p-5 mx-4"
            style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}`, maxWidth: 320 }}
          >
            <div className="flex items-center gap-2 mb-3" style={{ color: a11yMode ? AC.amber : PALETTE.amber }}>
              <Icon.Accessibility size={18} />
              <span className="text-sm font-semibold">{t.a11yToggle}</span>
            </div>
            <p className="text-sm leading-relaxed mb-5" style={{ color: AC.muted }}>
              {a11yMode ? t.a11yConfirmOff : t.a11yConfirmOn}
            </p>
            <div className="flex gap-2 justify-end">
              <button
                onClick={() => setShowA11yPrompt(false)}
                className="text-xs px-3 py-2 rounded-lg"
                style={{ color: AC.muted, border: `1px solid ${PALETTE.grid}` }}
              >
                {t.cancel}
              </button>
              <button
                onClick={() => {
                  setA11yMode((v) => !v);
                  setShowA11yPrompt(false);
                }}
                className="text-xs px-3 py-2 rounded-lg font-semibold"
                style={{ background: AC.amber, color: "#1a1200" }}
              >
                {a11yMode ? t.deactivate : t.activate}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<WayfindingPrototype />);
</script>

<script>
  // Compiliamo manualmente lo script sopra con runtime "classic":
  // di default Babel userebbe il runtime "automatic", che inietta un
  // "import react/jsx-runtime" — non eseguibile in una pagina senza bundler.
  var source = document.getElementById("app-source").textContent;
  var compiled = Babel.transform(source, {
    presets: [["react", { runtime: "classic" }]],
  }).code;
  var script = document.createElement("script");
  script.textContent = compiled;
  document.body.appendChild(script);
</script>
</body>
</html>
