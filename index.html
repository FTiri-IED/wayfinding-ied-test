function WayfindingPrototype() {
  const [floor, setFloor] = useState(0);
  const [selectedId, setSelectedId] = useState(null);
  const [selectedStairId, setSelectedStairId] = useState(null);
  const [selectedStairDirection, setSelectedStairDirection] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");

  const [lang, setLang] = useState("it"); // "it" | "en"

  // --- Fullscreen: richiede il vero schermo intero del browser sull'intero widget.
  // Su iOS Safari questa API ha supporto limitato per elementi generici (solo <video>
  // storicamente) — su Android Chrome e desktop funziona regolarmente.
  const rootRef = useRef(null);
  const [isFullscreen, setIsFullscreen] = useState(false);

  useEffect(() => {
    const onChange = () => setIsFullscreen(Boolean(document.fullscreenElement || document.webkitFullscreenElement));
    document.addEventListener("fullscreenchange", onChange);
    document.addEventListener("webkitfullscreenchange", onChange);
    return () => {
      document.removeEventListener("fullscreenchange", onChange);
      document.removeEventListener("webkitfullscreenchange", onChange);
    };
  }, []);

  const toggleFullscreen = () => {
    const el = rootRef.current;
    if (!el) return;
    const fsElement = document.fullscreenElement || document.webkitFullscreenElement;
    if (!fsElement) {
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  };

  // --- Parametro "show-only" nell'URL dell'iframe: es. ?show-only=PT-S1,PT-S3,PT-REC
  // Filtra quali AULE mostrare sulla mappa. Le scale non sono mai filtrate.
  // Se il parametro non è presente, si mostrano tutte le aule (comportamento di default).
  const [showOnlyCodes] = useState(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("show-only");
      if (!raw) return null;
      return raw
        .split(",")
        .map((s) => s.trim().toUpperCase())
        .filter(Boolean);
    } catch (e) {
      return null;
    }
  });

  // --- Parametro "data-url" nell'URL dell'iframe: es. ?data-url=https://tuosito.it/dati-aule.xlsx
  // Carica un file Excel e sovrascrive nome/attività/orario/descrizione delle aule,
  // associando ogni riga a un pin tramite la colonna "Codice" (deve combaciare col codice del pin, es. PT-S3).
  // Posizione, piano e codice dei pin restano SEMPRE quelli definiti nel codice: l'Excel
  // controlla solo il contenuto testuale, non la geometria della mappa.
  const [externalData, setExternalData] = useState(null);
  const [dataStatus, setDataStatus] = useState("idle"); // idle | loading | loaded | error

  useEffect(() => {
    let cancelled = false;
    const params = new URLSearchParams(window.location.search);
    const dataUrl = params.get("data-url");
    if (!dataUrl) return;
    if (typeof window.XLSX === "undefined") {
      setDataStatus("error");
      return;
    }
    setDataStatus("loading");
    fetch(dataUrl)
      .then((res) => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.arrayBuffer();
      })
      .then((buf) => {
        const wb = window.XLSX.read(buf, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet);
        const map = {};
        rows.forEach((row) => {
          const code = String(row.Codice || row.codice || row.Code || row.code || "")
            .trim()
            .toUpperCase();
          if (code) map[code] = row;
        });
        if (!cancelled) {
          setExternalData(map);
          setDataStatus("loaded");
        }
      })
      .catch(() => {
        if (!cancelled) setDataStatus("error");
      });
    return () => {
      cancelled = true;
    };
  }, []);

  // --- Parametro "goto" nell'URL dell'iframe: es. ?goto=PT-S3
  // Seleziona automaticamente quella stanza all'apertura della pagina
  // (utile per i QR code fisici che devono portare dritti a una stanza specifica).
  // Il pin di destinazione viene colorato diversamente (PALETTE.goto) per distinguerlo
  // da una normale selezione manuale.
  const [gotoCode, setGotoCode] = useState(null);

  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const goto = params.get("goto");
      if (!goto) return;
      const code = goto.trim().toUpperCase();
      if (showOnlyCodes && !showOnlyCodes.includes(code)) return;
      const loc = LOCATIONS.find((l) => l.code.toUpperCase() === code);
      if (!loc) return;
      setFloor(loc.floor);
      setSelectedId(loc.id);
      setGotoCode(code);
    } catch (e) {
      // parametro assente o URL non valido: nessun problema, si resta sulla vista di default
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const truthy = (v) => {
    if (v === undefined || v === null) return false;
    const s = String(v).trim().toLowerCase();
    return ["si", "sì", "yes", "true", "1", "x"].includes(s);
  };

  const UI = {
    it: {
      kicker: "Prototipo · Pianta reale, Via Sciesa 4",
      title: "Stessa mappa, ora con la vostra planimetria",
      intro:
        "La piantina del Piano Terra è la foto che mi hai inviato. I pin sono posizionati sopra, alle coordinate stimate di ciascuna stanza. Primo e Secondo Piano restano segnaposto in attesa delle rispettive foto.",
      dataLoading: "Aggiornamento dati delle aule in corso…",
      dataError: "Non sono riuscito a caricare i dati aggiornati — mostro i contenuti di default.",
      searchPlaceholder: "Cerca un'aula per nome o codice (es. S3, Reception)",
      noResults: "Nessuna aula trovata.",
      scrollHint: "← Scorri con il dito per vedere tutta la piantina",
      noPhoto: (floorLabel) =>
        `Nessuna foto caricata per il ${floorLabel.toLowerCase()}.\nInvia la planimetria di questo piano per attivare i punti qui sopra.`,
      overlayTouch: "Tocca per interagire con la mappa",
      hintActive: "Pizzica per ingrandire — i pin restano della stessa dimensione e seguono la posizione corretta.",
      hintOverlayShown: "Tocca ancora per attivare zoom e trascinamento.",
      hintIdle: "Tocca la mappa per iniziare.",
      resetZoom: "Reset zoom",
      waitingScan: "In attesa di scansione",
      waitingScanDesc: "Inquadra il QR appeso alla porta di una stanza, oppure scegli qui sotto.",
      noRoomsFloor: "Nessuna stanza ancora configurata su questo piano.",
      backToMap: "Mappa generale",
      nextStop: "Prossima tappa suggerita",
      routeDone: "Percorso completato — grazie per aver partecipato!",
      arrivedVia: (stairLabel, direction, floorLabel) =>
        `Sei ${direction === -1 ? "sceso" : "salito"} da ${stairLabel} — ora sei al ${floorLabel.toLowerCase()}.`,
    },
    en: {
      kicker: "Prototype · Real floor plan, Via Sciesa 4",
      title: "Same map, now with your floor plan",
      intro:
        "The Ground Floor plan is the photo you sent me. Pins are placed on it, at each room's estimated coordinates. First and Second Floor remain placeholders until their photos arrive.",
      dataLoading: "Updating room data…",
      dataError: "Couldn't load the updated data — showing default content.",
      searchPlaceholder: "Search a room by name or code (e.g. S3, Reception)",
      noResults: "No room found.",
      scrollHint: "← Swipe to see the whole floor plan",
      noPhoto: (floorLabel) =>
        `No photo uploaded yet for the ${floorLabel.toLowerCase()}.\nSend this floor's plan to activate the pins above.`,
      overlayTouch: "Tap to interact with the map",
      hintActive: "Pinch to zoom — pins stay the same size and follow the correct position.",
      hintOverlayShown: "Tap again to enable zoom and panning.",
      hintIdle: "Tap the map to get started.",
      resetZoom: "Reset zoom",
      waitingScan: "Waiting for scan",
      waitingScanDesc: "Scan the QR code on a room's door, or choose one below.",
      noRoomsFloor: "No rooms configured on this floor yet.",
      backToMap: "Back to map",
      nextStop: "Suggested next stop",
      routeDone: "Route completed — thanks for taking part!",
      arrivedVia: (stairLabel, direction, floorLabel) =>
        `You went ${direction === -1 ? "down" : "up"} via ${stairLabel} — you're now on the ${floorLabel.toLowerCase()}.`,
    },
  };
  const t = UI[lang];
  const fl = (floorObj) => (lang === "en" ? floorObj.labelEn : floorObj.label);

  const mergeExternal = (loc) => {
    const ext = externalData && externalData[loc.code.toUpperCase()];
    const useEn = lang === "en";

    const name = useEn
      ? (ext && (ext.Nome_EN || ext.nome_en)) || loc.nameEn || (ext && (ext.Nome || ext.nome)) || loc.name
      : (ext && (ext.Nome || ext.nome)) || loc.name;

    const activity = useEn
      ? (ext && (ext["Attività_EN"] || ext["Attivita_EN"] || ext.attivita_en)) ||
        loc.activityEn ||
        (ext && (ext.Attività || ext.Attivita)) ||
        loc.activity
      : (ext && (ext.Attività || ext.Attivita || ext.attività || ext.attivita)) || loc.activity;

    const desc = useEn
      ? (ext && (ext.Descrizione_EN || ext.descrizione_en)) || loc.descEn || (ext && ext.Descrizione) || loc.desc
      : (ext && (ext.Descrizione || ext.descrizione)) || loc.desc;

    const time = (ext && (ext.Orario || ext.orario)) || loc.time;

    // Colonne opzionali per "prossima tappa": appare SOLO se compilate nell'Excel,
    // non c'è più un percorso automatico predefinito.
    const nextStopName = ext
      ? useEn
        ? ext.Nome_prossima_tappa_EN || ext.nome_prossima_tappa_en || ext.Nome_prossima_tappa || ext.nome_prossima_tappa
        : ext.Nome_prossima_tappa || ext.nome_prossima_tappa
      : null;
    const nextStopCode = ext ? ext.ID_prossima_tappa || ext.id_prossima_tappa || ext.Codice_prossima_tappa || null : null;
    const nextStopComment = ext
      ? useEn
        ? ext.Commento_EN || ext.commento_en || ext.Commento || ext.commento
        : ext.Commento || ext.commento
      : null;

    return {
      ...loc,
      name,
      activity,
      time,
      desc,
      highlighted: ext ? truthy(ext.Evidenziato || ext.evidenziato || ext.Highlighted || ext.highlighted) : false,
      nextStopName: nextStopName || null,
      nextStopCode: nextStopCode ? String(nextStopCode).trim().toUpperCase() : null,
      nextStopComment: nextStopComment || null,
    };
  };

  const VISIBLE_LOCATIONS = (showOnlyCodes
    ? LOCATIONS.filter((l) => showOnlyCodes.includes(l.code.toUpperCase()))
    : LOCATIONS
  ).map(mergeExternal);


  const searchResults =
    searchQuery.trim().length > 0
      ? VISIBLE_LOCATIONS.filter(
          (l) =>
            l.name.toLowerCase().includes(searchQuery.trim().toLowerCase()) ||
            l.code.toLowerCase().includes(searchQuery.trim().toLowerCase())
        ).slice(0, 6)
      : [];

  // --- Zoom & pan della mappa: l'immagine si ingrandisce, i pin restano sempre
  // della stessa dimensione a schermo e si spostano solo per seguire il punto giusto.
  const canvasRef = useRef(null);
  const [canvasSize, setCanvasSize] = useState({ w: 0, h: 0 });
  const [view, setView] = useState({ scale: 1, x: 0, y: 0 });
  const [mapActive, setMapActive] = useState(false);
  const [overlayShown, setOverlayShown] = useState(false);
  const gestureRef = useRef({ lastDist: null, lastMid: null, lastTouch: null });

  useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    const update = () => setCanvasSize({ w: el.clientWidth, h: el.clientHeight });
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [floor]);

  const clampView = (next) => {
    const scaledW = canvasSize.w * next.scale;
    const scaledH = canvasSize.h * next.scale;
    const minX = Math.min(0, canvasSize.w - scaledW);
    const minY = Math.min(0, canvasSize.h - scaledH);
    return {
      scale: next.scale,
      x: Math.max(minX, Math.min(0, next.x)),
      y: Math.max(minY, Math.min(0, next.y)),
    };
  };

  const zoomAt = (midX, midY, scaleDelta) => {
    setView((prev) => {
      const newScale = Math.max(1, Math.min(4, prev.scale * scaleDelta));
      const ratio = newScale / prev.scale;
      const newX = midX - (midX - prev.x) * ratio;
      const newY = midY - (midY - prev.y) * ratio;
      return clampView({ scale: newScale, x: newX, y: newY });
    });
  };

  const resetZoom = () => setView({ scale: 1, x: 0, y: 0 });

  const dist = (t1, t2) => Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
  const mid = (t1, t2, rect) => ({
    x: (t1.clientX + t2.clientX) / 2 - rect.left,
    y: (t1.clientY + t2.clientY) / 2 - rect.top,
  });

  const onTouchStart = (e) => {
    if (!mapActive) return;
    const rect = canvasRef.current.getBoundingClientRect();
    if (e.touches.length === 2) {
      gestureRef.current.lastDist = dist(e.touches[0], e.touches[1]);
      gestureRef.current.lastMid = mid(e.touches[0], e.touches[1], rect);
    } else if (e.touches.length === 1) {
      gestureRef.current.lastTouch = {
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top,
      };
    }
  };

  const onTouchMove = (e) => {
    if (!mapActive) return;
    const rect = canvasRef.current.getBoundingClientRect();
    if (e.touches.length === 2) {
      e.preventDefault();
      const newDist = dist(e.touches[0], e.touches[1]);
      const newMid = mid(e.touches[0], e.touches[1], rect);
      const g = gestureRef.current;
      if (g.lastDist) {
        const scaleDelta = newDist / g.lastDist;
        zoomAt(newMid.x, newMid.y, scaleDelta);
      }
      g.lastDist = newDist;
      g.lastMid = newMid;
    } else if (e.touches.length === 1 && view.scale > 1) {
      e.preventDefault();
      const cur = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
      const g = gestureRef.current;
      if (g.lastTouch) {
        const dx = cur.x - g.lastTouch.x;
        const dy = cur.y - g.lastTouch.y;
        setView((prev) => clampView({ scale: prev.scale, x: prev.x + dx, y: prev.y + dy }));
      }
      gestureRef.current.lastTouch = cur;
    }
  };

  const onTouchEnd = (e) => {
    if (e.touches.length < 2) gestureRef.current.lastDist = null;
    if (e.touches.length < 1) gestureRef.current.lastTouch = null;
  };

  const onWheel = (e) => {
    if (!mapActive) return;
    e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const scaleDelta = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(x, y, scaleDelta);
  };

  // Converte la posizione in percentuale (x%,y%) di un pin nella posizione
  // reale in pixel dentro il riquadro, tenendo conto dello zoom/pan corrente.
  const projectPoint = (xPct, yPct) => {
    const baseX = (xPct / 100) * canvasSize.w;
    const baseY = (yPct / 100) * canvasSize.h;
    return { x: view.x + baseX * view.scale, y: view.y + baseY * view.scale };
  };

  const selectLocation = (id) => {
    const loc = VISIBLE_LOCATIONS.find((l) => l.id === id);
    if (!loc) return;
    setFloor(loc.floor);
    setSelectedId(id);
    setSelectedStairId(null);
    setSelectedStairDirection(null);
  };

  const goToStair = (stair, targetFloor, direction) => {
    setFloor(targetFloor);
    setSelectedStairId(stair.id);
    setSelectedStairDirection(direction);
    setSelectedId(null);
  };

  const selected = VISIBLE_LOCATIONS.find((l) => l.id === selectedId) || null;
  // "Prossima tappa" ora arriva SOLO dall'Excel (colonne Nome_prossima_tappa / ID_prossima_tappa / Commento).
  // Se non sono compilate per questa stanza, semplicemente non c'è alcuna prossima tappa da mostrare.
  const next =
    selected && selected.nextStopCode
      ? VISIBLE_LOCATIONS.find((l) => l.code.toUpperCase() === selected.nextStopCode) || null
      : null;

  const currentFloor = FLOORS.find((f) => f.id === floor);
  const pinsOnFloor = VISIBLE_LOCATIONS.filter((l) => l.floor === floor);

  return (
    <div
      ref={rootRef}
      style={{ background: PALETTE.bg, color: PALETTE.text, fontFamily: "'IBM Plex Sans', sans-serif" }}
      className="min-h-screen w-full"
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeSlide 0.25s ease-out; }
        .display-font { font-family: 'Space Grotesk', sans-serif; }
        .mono-font { font-family: 'IBM Plex Mono', monospace; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: ${PALETTE.grid}; border-radius: 4px; }
        .phone-col { width: 100%; }
        @media (min-width: 1024px) {
          .phone-col { width: 300px; flex: 0 0 300px; }
        }
      `}</style>

      <div className="max-w-5xl mx-auto px-3 py-5 md:px-4 md:py-12">
        {/* Switch lingua + fullscreen: riga statica in alto, non più sovrapposta al contenuto */}
        <div className="flex justify-end items-center gap-2 mb-3 md:mb-4">
          <button
            onClick={toggleFullscreen}
            className="rounded-full p-2 flex items-center justify-center"
            style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}` }}
            title={isFullscreen ? "Esci da schermo intero" : "Schermo intero"}
          >
            {isFullscreen ? <Icon.Minimize size={14} color={PALETTE.muted} /> : <Icon.Maximize size={14} color={PALETTE.muted} />}
          </button>
          <div
            style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}` }}
            className="rounded-full p-1 flex gap-1"
          >
            <button
              onClick={() => setLang("it")}
              className="mono-font text-[10px] px-2.5 py-1 rounded-full"
              style={{ background: lang === "it" ? PALETTE.amber : "transparent", color: lang === "it" ? "#1a1200" : PALETTE.muted }}
            >
              ITA
            </button>
            <button
              onClick={() => setLang("en")}
              className="mono-font text-[10px] px-2.5 py-1 rounded-full"
              style={{ background: lang === "en" ? PALETTE.amber : "transparent", color: lang === "en" ? "#1a1200" : PALETTE.muted }}
            >
              ENG
            </button>
          </div>
        </div>

        {/* Header */}
        <div className="mb-5 md:mb-8">
          <div className="flex items-center gap-2 mb-2 md:mb-3" style={{ color: PALETTE.amber }}>
            <Icon.ScanLine size={16} />
            <span className="mono-font text-[10px] md:text-xs tracking-widest uppercase">{t.kicker}</span>
          </div>
          <h1 className="display-font text-2xl md:text-4xl font-semibold mb-2 md:mb-3 leading-tight">
            {t.title}
          </h1>
          <p style={{ color: PALETTE.muted }} className="max-w-2xl leading-relaxed text-sm md:text-base">
            {t.intro}
          </p>
        </div>

        <div className="flex flex-col lg:flex-row gap-5 md:gap-6 items-start">
          {/* MAP PANEL */}
          <div className="w-full lg:flex-1">
            {/* Stato caricamento dati da Excel esterno, se richiesto via ?data-url= */}
            {dataStatus === "loading" && (
              <p className="text-[11px] mb-2" style={{ color: PALETTE.muted }}>
                {t.dataLoading}
              </p>
            )}
            {dataStatus === "error" && (
              <p className="text-[11px] mb-2" style={{ color: "#E8A34A" }}>
                {t.dataError}
              </p>
            )}

            {/* Ricerca aule con autocompletamento */}
            <div className="relative mb-4">
              <div
                className="flex items-center gap-2 rounded-xl px-3 py-2.5"
                style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}` }}
              >
                <Icon.Search size={16} color={PALETTE.muted} />
                <input
                  value={searchQuery}
                  onChange={(e) => {
                    setSearchQuery(e.target.value);
                    setSearchOpen(true);
                  }}
                  onFocus={() => setSearchOpen(true)}
                  onBlur={() => setTimeout(() => setSearchOpen(false), 120)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && searchResults.length > 0) {
                      selectLocation(searchResults[0].id);
                      setSearchQuery(searchResults[0].name);
                      setSearchOpen(false);
                    } else if (e.key === "Escape") {
                      setSearchOpen(false);
                    }
                  }}
                  placeholder={t.searchPlaceholder}
                  className="flex-1 bg-transparent outline-none text-sm"
                  style={{ color: PALETTE.text }}
                />
                {searchQuery && (
                  <button
                    onClick={() => {
                      setSearchQuery("");
                      setSearchOpen(false);
                    }}
                  >
                    <Icon.X size={15} color={PALETTE.muted} />
                  </button>
                )}
              </div>

              {searchOpen && searchQuery.trim().length > 0 && (
                <div
                  className="absolute left-0 right-0 mt-1.5 rounded-xl overflow-hidden fade-in"
                  style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.grid}`, zIndex: 40 }}
                >
                  {searchResults.length > 0 ? (
                    searchResults.map((loc) => (
                      <button
                        key={loc.id}
                        onMouseDown={() => {
                          selectLocation(loc.id);
                          setSearchQuery(loc.name);
                          setSearchOpen(false);
                        }}
                        className="w-full text-left px-3 py-2.5 flex items-center justify-between"
                        style={{ borderBottom: `1px solid ${PALETTE.grid}` }}
                      >
                        <div>
                          <div className="text-sm font-medium">{loc.name}</div>
                          <div className="mono-font text-[10px]" style={{ color: PALETTE.muted }}>
                            {loc.code} · {fl(FLOORS[loc.floor])}
                          </div>
                        </div>
                        <Icon.MapPin size={14} color={PALETTE.amber} />
                      </button>
                    ))
                  ) : (
                    <div className="px-3 py-2.5 text-sm" style={{ color: PALETTE.muted }}>
                      {t.noResults}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* floor tabs */}
            <div className="flex gap-2 mb-3">
              {FLOORS.map((f) => (
                <button
                  key={f.id}
                  onClick={() => {
                    setFloor(f.id);
                    setSelectedStairId(null);
                    setSelectedStairDirection(null);
                  }}
                  className="flex-1 rounded-lg py-2.5 px-3 flex flex-col items-center transition-colors"
                  style={{
                    background: floor === f.id ? PALETTE.amber : PALETTE.panel,
                    color: floor === f.id ? "#1a1200" : PALETTE.text,
                    border: `1px solid ${floor === f.id ? PALETTE.amber : PALETTE.grid}`,
                  }}
                >
                  <span className="display-font font-semibold text-sm">{f.code}</span>
                  <span className="text-[11px]" style={{ opacity: 0.85 }}>
                    {fl(f)}
                  </span>
                </button>
              ))}
            </div>

            {/* canvas */}
            <div
              ref={canvasRef}
              className="relative w-full rounded-2xl overflow-hidden select-none"
              style={{
                aspectRatio: "1100 / 1174",
                background: PALETTE.panel,
                border: `1px solid ${PALETTE.grid}`,
                touchAction: mapActive ? "none" : "pan-y",
              }}
              onTouchStart={onTouchStart}
              onTouchMove={onTouchMove}
              onTouchEnd={onTouchEnd}
              onWheel={onWheel}
              onClick={() => {
                if (!mapActive && !overlayShown) setOverlayShown(true);
              }}
            >
              {/* livello che si ingrandisce/sposta: solo l'immagine vive qui */}
              <div
                className="absolute inset-0"
                style={{
                  backgroundImage: currentFloor.hasPhoto ? `url(${FLOOR0_IMG})` : "none",
                  backgroundSize: "cover",
                  backgroundPosition: "center",
                  transform: `translate(${view.x}px, ${view.y}px) scale(${view.scale})`,
                  transformOrigin: "0 0",
                  willChange: "transform",
                }}
              />

              {!currentFloor.hasPhoto && (
                <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 p-6 text-center">
                  <Icon.ImageOff size={28} style={{ color: PALETTE.muted }} />
                  <p className="text-sm whitespace-pre-line" style={{ color: PALETTE.muted }}>
                    {t.noPhoto(fl(currentFloor))}
                  </p>
                </div>
              )}

              {currentFloor.hasPhoto && (
                <div
                  className="absolute inset-0"
                  style={{
                    background: "linear-gradient(to bottom, rgba(15,27,45,0.05), rgba(15,27,45,0.25))",
                    transform: `translate(${view.x}px, ${view.y}px) scale(${view.scale})`,
                    transformOrigin: "0 0",
                  }}
                />
              )}

              {/* pin e scale vivono FUORI dal livello zoomato: dimensione fissa,
                  posizione ricalcolata ad ogni zoom/pan per restare ancorati al punto giusto */}
              {pinsOnFloor.map((loc) => {
                const p = projectPoint(loc.x, loc.y);
                const isActive = selectedId === loc.id;
                const anySelected = selectedId !== null;
                const size = isActive ? 30 : anySelected ? 16 : 30;
                const isGotoTarget = gotoCode && loc.code.toUpperCase() === gotoCode;
                const pinColor = isGotoTarget ? PALETTE.goto : loc.highlighted ? PALETTE.highlight : PALETTE.amber;
                const pinColorSoft = isGotoTarget ? PALETTE.gotoSoft : loc.highlighted ? PALETTE.highlightSoft : PALETTE.amberSoft;
                const activeTextColor = isGotoTarget || loc.highlighted ? "#2a0a0a" : "#1a1200";
                return (
                  <button
                    key={loc.id}
                    onClick={(e) => {
                      e.stopPropagation();
                      selectLocation(loc.id);
                    }}
                    className="absolute top-0 left-0 flex flex-col items-center group p-1.5 transition-all"
                    style={{ transform: `translate(${p.x}px, ${p.y}px) translate(-50%, -50%)`, willChange: "transform" }}
                  >
                    <div
                      className="rounded-full flex items-center justify-center transition-all group-hover:scale-110"
                      style={{
                        width: size,
                        height: size,
                        background: isActive ? pinColor : "#0B1626",
                        border: `2px solid ${pinColor}`,
                        boxShadow: isActive ? `0 0 0 6px ${pinColorSoft}` : "0 1px 6px rgba(0,0,0,0.5)",
                        opacity: !isActive && anySelected ? 0.7 : 1,
                      }}
                    >
                      {(isActive || !anySelected) && (
                        <Icon.MapPin size={14} color={isActive ? activeTextColor : pinColor} />
                      )}
                    </div>
                    <span
                      className={isActive ? "text-[10px] mt-1 px-1.5 py-0.5 rounded transition-opacity font-bold whitespace-nowrap" : "mono-font text-[9px] mt-1 px-1.5 py-0.5 rounded transition-opacity"}
                      style={{
                        background: "#0B1626",
                        color: pinColor,
                        opacity: !isActive && anySelected ? 0.55 : 1,
                      }}
                    >
                      {isActive ? loc.name : loc.code}
                    </span>
                  </button>
                );
              })}
              {STAIRS.map((s) => {
                const directions = floor === 0 ? [1] : floor === 2 ? [-1] : [1, -1];
                const p = projectPoint(s.x, s.y);
                return (
                  <div
                    key={s.id}
                    className="absolute top-0 left-0 flex flex-col items-center"
                    style={{ transform: `translate(${p.x}px, ${p.y}px) translate(-50%, -50%)`, willChange: "transform" }}
                  >
                    <div className="flex items-center gap-1">
                      {directions.map((direction) => {
                        const targetFloor = floor + direction;
                        const isActive = selectedStairId === s.id && selectedStairDirection === direction;
                        return (
                          <button
                            key={direction}
                            onClick={(e) => {
                              e.stopPropagation();
                              goToStair(s, targetFloor, direction);
                            }}
                            className="rounded-full flex items-center justify-center transition-transform hover:scale-110 p-1"
                            style={{
                              width: 34,
                              height: 34,
                              background: isActive ? "#3DDC97" : "#0B1626",
                              border: "2px solid #3DDC97",
                              boxShadow: isActive ? "0 0 0 6px #164B36" : "0 1px 6px rgba(0,0,0,0.5)",
                            }}
                            title={`${s.label} → ${fl(FLOORS[targetFloor])}`}
                          >
                            {direction === 1 ? (
                              <Icon.ArrowUpCircle size={15} color={isActive ? "#0B1626" : "#3DDC97"} />
                            ) : (
                              <Icon.ArrowDownCircle size={15} color={isActive ? "#0B1626" : "#3DDC97"} />
                            )}
                          </button>
                        );
                      })}
                    </div>
                    <span
                      className="mono-font text-[9px] mt-1 px-1.5 py-0.5 rounded"
                      style={{ background: "#0B1626", color: "#3DDC97" }}
                    >
                      {s.label.replace("Scala ", "")}
                    </span>
                  </div>
                );
              })}

              {view.scale > 1.03 && (
                <button
                  onClick={resetZoom}
                  className="absolute top-2 right-2 mono-font text-[10px] px-2.5 py-1.5 rounded-full"
                  style={{ background: "rgba(11,22,38,0.85)", color: PALETTE.amber, border: `1px solid ${PALETTE.amber}` }}
                >
                  {t.resetZoom}
                </button>
              )}

              {/* L'overlay compare solo dopo il primo tocco sulla mappa (che viene
                  "assorbito" solo per farlo apparire, senza attivare nulla). Il tocco
                  successivo, sull'overlay stesso, attiva davvero la mappa. */}
              {overlayShown && !mapActive && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setMapActive(true);
                    setOverlayShown(false);
                  }}
                  className="absolute inset-0 flex items-center justify-center fade-in"
                  style={{ background: "rgba(11,22,38,0.45)", zIndex: 30 }}
                >
                  <span
                    className="mono-font text-xs px-4 py-2 rounded-full flex items-center gap-2"
                    style={{ background: "rgba(11,22,38,0.9)", color: PALETTE.text, border: `1px solid ${PALETTE.amber}` }}
                  >
                    <Icon.MapPin size={13} color={PALETTE.amber} />
                    {t.overlayTouch}
                  </span>
                </button>
              )}
            </div>
            <p className="text-[11px] mt-1.5" style={{ color: PALETTE.muted }}>
              {mapActive ? t.hintActive : overlayShown ? t.hintOverlayShown : t.hintIdle}
            </p>
          </div>

          {/* PHONE MOCK */}
          <div className="phone-col flex justify-center">
            <div
              className="rounded-[2.25rem] p-2.5 w-full"
              style={{ background: "#0B1626", border: `1px solid ${PALETTE.grid}`, maxWidth: 300 }}
            >
              <div className="flex justify-center mb-1.5">
                <div className="w-16 h-1.5 rounded-full" style={{ background: PALETTE.grid }} />
              </div>
              <div className="rounded-2xl overflow-y-auto" style={{ background: PALETTE.bg, maxHeight: "62vh" }}>
                <div className="p-4" key={selectedId || "home"}>
                  {!selected ? (
                    <div className="fade-in">
                      <div className="flex items-center gap-2 mb-4" style={{ color: PALETTE.amber }}>
                        <Icon.Building2 size={16} />
                        <span className="mono-font text-[11px] uppercase tracking-wide">
                          Via Sciesa 4 · {fl(currentFloor)}
                        </span>
                      </div>
                      {selectedStairId ? (
                        <div
                          className="rounded-lg p-2.5 mb-4 flex items-center gap-2"
                          style={{ background: "#122A22", border: "1px solid #245C45" }}
                        >
                          {selectedStairDirection === -1 ? (
                            <Icon.ArrowDownCircle size={16} color="#3DDC97" />
                          ) : (
                            <Icon.ArrowUpCircle size={16} color="#3DDC97" />
                          )}
                          <span className="text-xs" style={{ color: "#8FE8C8" }}>
                            {t.arrivedVia(STAIRS.find((s) => s.id === selectedStairId)?.label, selectedStairDirection, fl(currentFloor))}
                          </span>
                        </div>
                      ) : (
                        <>
                          <h2 className="display-font text-lg font-semibold mb-1">{t.waitingScan}</h2>
                          <p className="text-xs mb-4" style={{ color: PALETTE.muted }}>
                            {t.waitingScanDesc}
                          </p>
                        </>
                      )}
                      <div className="flex flex-col gap-2">
                        {pinsOnFloor.map((loc) => (
                          <button
                            key={loc.id}
                            onClick={() => selectLocation(loc.id)}
                            className="text-left rounded-lg p-2.5 flex items-center justify-between"
                            style={{ background: PALETTE.panelAlt, border: `1px solid ${PALETTE.grid}` }}
                          >
                            <div>
                              <div className="text-sm font-medium">{loc.name}</div>
                              <div className="mono-font text-[10px]" style={{ color: PALETTE.muted }}>
                                {loc.code} · {loc.time}
                              </div>
                            </div>
                            <Icon.ArrowRight size={14} style={{ color: PALETTE.amber }} />
                          </button>
                        ))}
                        {pinsOnFloor.length === 0 && (
                          <p className="text-xs" style={{ color: PALETTE.muted }}>
                            {t.noRoomsFloor}
                          </p>
                        )}
                      </div>
                    </div>
                  ) : (
                    <div className="fade-in">
                      <button
                        onClick={() => setSelectedId(null)}
                        className="flex items-center gap-1 mb-4 text-xs"
                        style={{ color: PALETTE.muted }}
                      >
                        <Icon.Home size={12} /> {t.backToMap}
                      </button>
                      <div className="mono-font text-[11px] uppercase tracking-wide mb-1" style={{ color: PALETTE.amber }}>
                        Via Sciesa 4 · {fl(currentFloor)}
                      </div>
                      <h2 className="display-font text-xl font-semibold mb-2 leading-tight">{selected.name}</h2>
                      <div
                        className="inline-block mono-font text-[10px] px-2 py-1 rounded mb-3"
                        style={{ background: PALETTE.panelAlt, color: PALETTE.text }}
                      >
                        {selected.time}
                      </div>
                      <p className="text-sm font-medium mb-1">{selected.activity}</p>
                      <p className="text-xs leading-relaxed mb-5" style={{ color: PALETTE.muted }}>
                        {selected.desc}
                      </p>

                      {selected.nextStopName && (
                        <div className="rounded-xl p-3" style={{ background: PALETTE.panelAlt, border: `1px solid ${PALETTE.grid}` }}>
                          <div className="text-[10px] mb-1" style={{ color: PALETTE.muted }}>
                            {t.nextStop}
                          </div>
                          {next ? (
                            <button onClick={() => selectLocation(next.id)} className="w-full flex items-center justify-between">
                              <div className="text-left">
                                <div className="text-sm font-medium">{selected.nextStopName}</div>
                                <div className="mono-font text-[10px]" style={{ color: PALETTE.muted }}>
                                  {fl(FLOORS[next.floor])}
                                </div>
                              </div>
                              <Icon.ArrowRight size={16} style={{ color: PALETTE.amber }} />
                            </button>
                          ) : (
                            <div className="text-sm font-medium">{selected.nextStopName}</div>
                          )}
                          {selected.nextStopComment && (
                            <p className="text-xs mt-1.5" style={{ color: PALETTE.muted }}>
                              {selected.nextStopComment}
                            </p>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>

        <p className="text-xs mt-8" style={{ color: PALETTE.muted }}>
          Le coordinate dei pin sulla foto sono una stima visiva mia: dimmi se qualche punto va spostato
          (es. "S8 è più in alto") e lo correggo subito. Inviami le foto di Primo e Secondo Piano per completare l'edificio.
        </p>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<WayfindingPrototype />);
</script>

<script>
  // Compiliamo manualmente lo script sopra con runtime "classic":
  // di default Babel userebbe il runtime "automatic", che inietta un
  // "import react/jsx-runtime" — non eseguibile in una pagina senza bundler.
  var source = document.getElementById("app-source").textContent;
  var compiled = Babel.transform(source, {
    presets: [["react", { runtime: "classic" }]],
  }).code;
  var script = document.createElement("script");
  script.textContent = compiled;
  document.body.appendChild(script);
</script>
</body>
</html>
